# XcodeGen project spec — run `xcodegen generate` to produce GuitarixMac.xcodeproj
# https://github.com/yonaskolb/XcodeGen

name: GuitarixMac
options:
  bundleIdPrefix: com.guitarix
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  SWIFT_VERSION: "5.9"
  MACOSX_DEPLOYMENT_TARGET: "13.0"
  ENABLE_HARDENED_RUNTIME: YES
  ENABLE_USER_SELECTED_FILES: readOnly     # for IR file picker
  LIBRARY_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/build/lib"
  # Stubs MUST come first — they intercept GTK/Linux headers with macOS-safe stubs.
  # Then all versioned Homebrew include dirs the engine headers need.
  HEADER_SEARCH_PATHS: >
    $(inherited)
    $(PROJECT_DIR)/Sources/stubs
    $(PROJECT_DIR)/build/include/guitarix
    $(PROJECT_DIR)/Sources/Bridge
    /opt/homebrew/include
    /usr/local/include
    /opt/homebrew/Cellar/glibmm@2.66/2.66.8/include/glibmm-2.4
    /opt/homebrew/Cellar/glibmm@2.66/2.66.8/lib/glibmm-2.4/include
    /opt/homebrew/Cellar/glibmm@2.66/2.66.8/include/giomm-2.4
    /opt/homebrew/Cellar/glibmm@2.66/2.66.8/lib/giomm-2.4/include
    /opt/homebrew/Cellar/glib/2.88.1/include/glib-2.0
    /opt/homebrew/Cellar/glib/2.88.1/lib/glib-2.0/include
    /opt/homebrew/Cellar/glib/2.88.1/include
    /opt/homebrew/opt/gettext/include
    /opt/homebrew/Cellar/pcre2/10.47_1/include
    /opt/homebrew/Cellar/libsigc++@2/2.12.2/include/sigc++-2.0
    /opt/homebrew/Cellar/libsigc++@2/2.12.2/lib/sigc++-2.0/include
    /opt/homebrew/Cellar/lilv/0.26.4/include/lilv-0
    /opt/homebrew/Cellar/sratom/0.6.22/include/sratom-0
    /opt/homebrew/Cellar/sord/0.16.22/include/sord-0
    /opt/homebrew/Cellar/serd/0.32.8/include/serd-0
    /opt/homebrew/Cellar/lv2/1.18.10/include
    /opt/homebrew/Cellar/zix/0.8.0/include/zix-0
    $(PROJECT_DIR)/../trunk/src/zita-resampler-1.1.0
    $(PROJECT_DIR)/../trunk/src/zita-convolver
    $(PROJECT_DIR)/../trunk/src/gx_head/engine
    $(PROJECT_DIR)/../trunk/src/faust-generated
    $(PROJECT_DIR)/../trunk/src/gx_head/engine/tabels
    $(PROJECT_DIR)/../trunk/src/plugins
  # Force-include macOS compat shims for all C/C++/ObjC++ TUs (same as CMake -include flag)
  OTHER_CPLUSPLUSFLAGS: >
    $(inherited)
    -include $(PROJECT_DIR)/Sources/stubs/macos_compat.h

targets:

  # ── Main macOS application ─────────────────────────────────────────────────
  GuitarixMac:
    type: application
    platform: macOS
    sources:
      - Sources/App
      - path: Sources/Bridge
        compilerFlags: "-x objective-c++"
    dependencies:
      - sdk: CoreAudio.framework
      - sdk: AudioToolbox.framework
      - sdk: AudioUnit.framework
      - sdk: Foundation.framework
      - sdk: AppKit.framework
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.guitarix.GuitarixMac
      INFOPLIST_FILE: Resources/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GCC_INPUT_FILETYPE: automatic
      CLANG_CXX_LANGUAGE_STANDARD: "c++17"
      CLANG_CXX_LIBRARY: "libc++"
      OTHER_LDFLAGS: >
        $(PROJECT_DIR)/build/lib/libguitarix_coreaudio.a
        $(PROJECT_DIR)/build/lib/libguitarix_engine.a
        -L/opt/homebrew/lib
        -L/usr/local/lib
        -lglibmm-2.4
        -lgobject-2.0
        -lglib-2.0
        -lsigc-2.0
        -lsndfile
        -lfftw3f
        -lboost_thread-mt
        -lboost_iostreams
        -ldl
      SWIFT_OBJC_BRIDGING_HEADER: Sources/Bridge/GuitarixMac-Bridging-Header.h
